<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>LuxContact FINAL</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px;}
.card { background:white; padding:15px; margin:10px 0; border-radius:10px;}
input, select, button { margin:5px; padding:8px;}
h1 { text-align:center;}
</style>
</head><body><h1>LuxContact</h1><div class="card">
<h2>Nueva venta</h2>
<input id="cliente" placeholder="Cliente">
<input id="telefono" placeholder="Teléfono">
<select id="comercial"></select>
<select id="tarifa"></select>
<select id="sva"></select>
<input id="permanencia" placeholder="Meses">
<button onclick="guardarVenta()">Guardar</button>
</div><div class="card">
<h2>SVA</h2>
<input id="nuevoSVA" placeholder="Nombre SVA">
<button onclick="addSVA()">Guardar</button>
<div id="listaSVA"></div>
</div><div class="card">
<h2>Ventas</h2>
<div id="listaVentas"></div>
</div><script>
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let comerciales = ["Juan","Ana"];
let tarifas = [{nombre:"Fibra", beneficio:20}];
let svas = JSON.parse(localStorage.getItem("svas")) || ["Seguro","TV"];

let editIndex = null;

function guardar(){
 localStorage.setItem("ventas", JSON.stringify(ventas));
 localStorage.setItem("svas", JSON.stringify(svas));
}

function addSVA(){
 if(!nuevoSVA.value) return;

 if(editIndex!==null){
  svas[editIndex] = nuevoSVA.value;
  editIndex = null;
 } else {
  svas.push(nuevoSVA.value);
 }

 nuevoSVA.value="";
 guardar();
 render();
}

function editarSVA(i){
 nuevoSVA.value = svas[i];
 editIndex = i;
}

function eliminarSVA(i){
 let nombre = svas[i];

 if(ventas.some(v=>v.sva===nombre)){
  alert("No puedes borrar: tiene ventas asociadas");
  return;
 }

 if(confirm("¿Eliminar SVA?")){
  svas.splice(i,1);
  guardar();
  render();
 }
}

function guardarVenta(){
 if(!cliente.value) return;

 ventas.push({
  cliente: cliente.value,
  comercial: comercial.value,
  tarifa: tarifa.value,
  sva: sva.value
 });

 cliente.value="";
 guardar();
 render();
}

function render(){

 document.getElementById("sva").innerHTML =
 svas.map(s=>`<option>${s}</option>`).join("");

 document.getElementById("listaSVA").innerHTML =
 svas.map((s,i)=>`
  <p>${s}
  <button onclick="editarSVA(${i})">✏️</button>
  <button onclick="eliminarSVA(${i})">❌</button>
  </p>
 `).join("");

 document.getElementById("listaVentas").innerHTML =
 ventas.map(v=>`<p>${v.cliente} - ${v.sva}</p>`).join("");
}

render();
</script></body>
</html>
