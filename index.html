<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>LuxContact FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px;}
h1 { text-align:center;}
.card { background:white; padding:15px; margin:10px 0; border-radius:10px;}
input, select, button { margin:5px; padding:8px;}
</style>
</head><body><h1>LuxContact</h1><div class="card">
<h2>Nueva / Editar venta</h2>
<input id="cliente" placeholder="Cliente">
<input id="telefono" placeholder="Teléfono">
<select id="comercial"></select>
<select id="tarifa"></select>
<input id="permanencia" placeholder="Meses">
<button onclick="guardarVenta()">Guardar</button>
</div><div class="card">
<h2>Ventas</h2>
<div id="ventas"></div>
</div><div class="card">
<h2>Comerciales</h2>
<input id="nuevoComercial" placeholder="Nombre">
<button onclick="addComercial()">Añadir</button>
<div id="listaComerciales"></div>
</div><div class="card">
<h2>Tarifas</h2>
<input id="nombreTarifa" placeholder="Nombre">
<input id="beneficioTarifa" placeholder="Beneficio">
<button onclick="addTarifa()">Añadir</button>
<div id="listaTarifas"></div>
</div><div class="card">
<h2>Dashboard</h2>
<p id="ventasTotal"></p>
<p id="beneficioTotal"></p>
<p id="comisionesTotal"></p>
<canvas id="grafica"></canvas>
</div><div class="card">
<h2>Ranking</h2>
<div id="ranking"></div>
</div><div class="card">
<h2>Alertas</h2>
<div id="alertas"></div>
</div><script>
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let comerciales = JSON.parse(localStorage.getItem("comerciales")) || ["Juan","Ana"];
let tarifas = JSON.parse(localStorage.getItem("tarifas")) || [
 {nombre:"Fibra", beneficio:20},
 {nombre:"Móvil", beneficio:15}
];

let editIndex = null;

function guardar(){
 localStorage.setItem("ventas", JSON.stringify(ventas));
 localStorage.setItem("comerciales", JSON.stringify(comerciales));
 localStorage.setItem("tarifas", JSON.stringify(tarifas));
}

function addComercial(){
 if(!nuevoComercial.value) return;
 comerciales.push(nuevoComercial.value);
 nuevoComercial.value="";
 guardar(); render();
}

function addTarifa(){
 if(!nombreTarifa.value || !beneficioTarifa.value) return;
 tarifas.push({nombre:nombreTarifa.value, beneficio:parseInt(beneficioTarifa.value)});
 nombreTarifa.value="";
 beneficioTarifa.value="";
 guardar(); render();
}

function getComision(n){
 if(n<=10) return 0;
 if(n<=15) return 50;
 if(n<=20) return 75;
 return 100;
}

function guardarVenta(){
 if(!cliente.value || !comercial.value || !tarifa.value){
  alert("Faltan datos");
  return;
 }

 let venta = {
  cliente: cliente.value,
  telefono: telefono.value,
  comercial: comercial.value,
  tarifa: tarifa.value,
  permanencia: parseInt(permanencia.value)||0,
  fecha: new Date()
 };

 if(editIndex!==null){
  ventas[editIndex]=venta;
  editIndex=null;
 } else {
  ventas.push(venta);
 }

 cliente.value="";
 telefono.value="";
 permanencia.value="";

 guardar();
 render();
}

function editar(i){
 let v = ventas[i];
 cliente.value=v.cliente;
 telefono.value=v.telefono;
 comercial.value=v.comercial;
 tarifa.value=v.tarifa;
 permanencia.value=v.permanencia;
 editIndex=i;
}

function eliminar(i){
 ventas.splice(i,1);
 guardar();
 render();
}

function render(){

 comercial.innerHTML = comerciales.map(c=>`<option>${c}</option>`).join("");
 tarifa.innerHTML = tarifas.map(t=>`<option>${t.nombre}</option>`).join("");

 listaComerciales.innerHTML = comerciales.map(c=>`<p>${c}</p>`).join("");
 listaTarifas.innerHTML = tarifas.map(t=>`<p>${t.nombre} - ${t.beneficio}€</p>`).join("");

 ventas.innerHTML = ventas.map((v,i)=>
  `<p>${v.cliente} - ${v.comercial}
  <button onclick="editar(${i})">Editar</button>
  <button onclick="eliminar(${i})">Eliminar</button></p>`
 ).join("");

 let ventasMes = {};
 let comisiones = 0;
 let beneficio = 0;

 ventas.forEach(v=>{
  let mes = new Date(v.fecha).getMonth();
  let key = v.comercial+"-"+mes;
  if(!ventasMes[key]) ventasMes[key]=0;
  ventasMes[key]++;

  let num = ventasMes[key];
  comisiones += getComision(num);

  let tarifaObj = tarifas.find(t=>t.nombre===v.tarifa);
  if(tarifaObj) beneficio += tarifaObj.beneficio;
 });

 ventasTotal.innerText="Ventas: "+ventas.length;
 comisionesTotal.innerText="Comisiones: "+comisiones+"€";
 beneficioTotal.innerText="Beneficio: "+beneficio+"€";

 let ranking={};
 ventas.forEach(v=>{
  ranking[v.comercial]=(ranking[v.comercial]||0)+1;
 });

 ranking.innerHTML = Object.entries(ranking)
 .sort((a,b)=>b[1]-a[1])
 .map(r=>`<p>${r[0]}: ${r[1]}</p>`).join("");

 let hoy=new Date();
 alertas.innerHTML = ventas.filter(v=>{
  let fin=new Date(v.fecha);
  fin.setMonth(fin.getMonth()+v.permanencia);
  return (fin-hoy)/(1000*60*60*24)<30;
 }).map(v=>`<p>${v.cliente} renovar</p>`).join("");

 let data={};
 ventas.forEach(v=>{
  data[v.comercial]=(data[v.comercial]||0)+1;
 });

 if(window.chart) window.chart.destroy();

 window.chart = new Chart(document.getElementById("grafica"),{
  type:'bar',
  data:{ labels:Object.keys(data), datasets:[{data:Object.values(data)}] }
 });
}

render();
</script></body>
</html>
