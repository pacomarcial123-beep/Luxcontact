<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>LuxContact PRO</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px;}
.card { background:white; padding:15px; margin:10px 0; border-radius:10px;}
input, select, button { margin:5px; padding:8px;}
h1 { text-align:center;}
</style>
</head><body><h1>LuxContact</h1><div class="card">
<h2>Nueva venta</h2>
<input id="cliente" placeholder="Cliente">
<input id="telefono" placeholder="Teléfono">
<select id="comercial"></select>
<select id="tarifa"></select>
<input id="permanencia" placeholder="Meses">
<button onclick="guardarVenta()">Guardar</button>
</div><div class="card">
<h2>Comerciales</h2>
<input id="nuevoComercial" placeholder="Nombre">
<button onclick="addComercial()">Añadir</button>
<div id="listaComerciales"></div>
</div><div class="card">
<h2>Tarifas</h2>
<input id="nombreTarifa" placeholder="Nombre">
<input id="beneficioTarifa" placeholder="Beneficio">
<button onclick="addTarifa()">Añadir</button>
<div id="listaTarifas"></div>
</div><div class="card">
<h2>Ventas</h2>
<div id="ventas"></div>
</div><script>
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let comerciales = JSON.parse(localStorage.getItem("comerciales")) || ["Juan","Ana"];
let tarifas = JSON.parse(localStorage.getItem("tarifas")) || [
 {nombre:"Fibra", beneficio:20},
 {nombre:"Móvil", beneficio:15}
];

let editComIndex = null;
let editTarIndex = null;

function guardar(){
 localStorage.setItem("ventas", JSON.stringify(ventas));
 localStorage.setItem("comerciales", JSON.stringify(comerciales));
 localStorage.setItem("tarifas", JSON.stringify(tarifas));
}

function guardarVenta(){
 if(!cliente.value || !comercial.value || !tarifa.value){
  alert("Faltan datos"); return;
 }

 ventas.push({
  cliente: cliente.value,
  telefono: telefono.value,
  comercial: comercial.value,
  tarifa: tarifa.value,
  permanencia: parseInt(permanencia.value)||0,
  fecha: new Date()
 });

 cliente.value=""; telefono.value=""; permanencia.value="";
 guardar(); render();
}

function addComercial(){
 if(!nuevoComercial.value) return;

 if(editComIndex!==null){
  comerciales[editComIndex]=nuevoComercial.value;
  editComIndex=null;
 } else {
  comerciales.push(nuevoComercial.value);
 }

 nuevoComercial.value="";
 guardar(); render();
}

function editarComercial(i){
 nuevoComercial.value = comerciales[i];
 editComIndex = i;
}

function eliminarComercial(i){
 let nombre = comerciales[i];

 if(ventas.some(v=>v.comercial===nombre)){
  alert("No puedes borrar: tiene ventas asociadas");
  return;
 }

 if(confirm("¿Eliminar comercial?")){
  comerciales.splice(i,1);
  guardar(); render();
 }
}

function addTarifa(){
 if(!nombreTarifa.value || !beneficioTarifa.value) return;

 if(editTarIndex!==null){
  tarifas[editTarIndex] = {
   nombre:nombreTarifa.value,
   beneficio:parseInt(beneficioTarifa.value)
  };
  editTarIndex=null;
 } else {
  tarifas.push({
   nombre:nombreTarifa.value,
   beneficio:parseInt(beneficioTarifa.value)
  });
 }

 nombreTarifa.value=""; beneficioTarifa.value="";
 guardar(); render();
}

function editarTarifa(i){
 nombreTarifa.value = tarifas[i].nombre;
 beneficioTarifa.value = tarifas[i].beneficio;
 editTarIndex = i;
}

function eliminarTarifa(i){
 let nombre = tarifas[i].nombre;

 if(ventas.some(v=>v.tarifa===nombre)){
  alert("No puedes borrar: tiene ventas asociadas");
  return;
 }

 if(confirm("¿Eliminar tarifa?")){
  tarifas.splice(i,1);
  guardar(); render();
 }
}

function render(){

 comercial.innerHTML = comerciales.map(c=>`<option>${c}</option>`).join("");
 tarifa.innerHTML = tarifas.map(t=>`<option>${t.nombre}</option>`).join("");

 listaComerciales.innerHTML = comerciales.map((c,i)=>
  `<p>${c}
   <button onclick="editarComercial(${i})">✏️</button>
   <button onclick="eliminarComercial(${i})">❌</button></p>`
 ).join("");

 listaTarifas.innerHTML = tarifas.map((t,i)=>
  `<p>${t.nombre} (${t.beneficio}€)
   <button onclick="editarTarifa(${i})">✏️</button>
   <button onclick="eliminarTarifa(${i})">❌</button></p>`
 ).join("");

 ventas.innerHTML = ventas.map(v=>`<p>${v.cliente} - ${v.comercial}</p>`).join("");
}

render();
</script></body>
</html>
